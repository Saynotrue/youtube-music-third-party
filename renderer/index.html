<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="bar">
    <img id="album-art" src="" alt="">
    <div id="track-info">
      <span id="title">곡을 재생해보세요</span>
      <span id="artist"></span>
    </div>
    <div id="lyrics-container">
      <span id="prev-lyric"></span>
      <span id="current-lyric"></span>
      <span id="next-lyric"></span>
    </div>
    <div id="equalizer">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <div id="controls">
      <button id="btn-prev">⏮</button>
      <button id="btn-play-pause">⏸</button>
      <button id="btn-next">⏭</button>
    </div>
    <div id="progress-bar">
      <div id="progress-fill"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>

</html>
